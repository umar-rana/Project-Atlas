<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="#2896f5"/>
  <!-- Three stacked bars: bottom widest, top narrowest -->
  <!-- Total height: 3×26 + 2×20 = 118. Start y = 128 - 59 = 69 -->
  <!-- Top bar: 96px wide, centered at 128 → x=80 -->
  <rect x="80" y="69" width="96" height="26" rx="13" fill="white"/>
  <!-- Middle bar: 144px wide, centered → x=56 -->
  <rect x="56" y="115" width="144" height="26" rx="13" fill="white"/>
  <!-- Bottom bar: 192px wide, centered → x=32 -->
  <rect x="32" y="161" width="192" height="26" rx="13" fill="white"/>
</svg>
