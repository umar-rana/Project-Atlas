<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8"><title>Stratum logo</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100%; }
  .stage { display: grid; grid-template-columns: auto 1fr; gap: 32px; align-items: center; padding: 20px 24px; }
  .mark { width: 96px; height: 96px; background: var(--surface-raised); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); display: flex; align-items: center; justify-content: center; }
  .word { display: flex; flex-direction: column; gap: 6px; }
  .word .lockup { display: flex; align-items: center; gap: 10px; }
  .word .lockup svg { width: 24px; height: 24px; }
  .word .name { font: 600 22px/1 var(--font-ui); letter-spacing: -0.018em; color: var(--text-primary); }
  .word .name .dim { color: var(--text-tertiary); font-weight: 500; }
  .word .tag { font: 400 12px/1.4 var(--font-ui); color: var(--text-secondary); max-width: 36ch; }
</style>
</head>
<body>
<div class="card">
  <div class="stage">
    <div class="mark">
      <!-- Stratum mark: three stacked layers, the topmost accented -->
      <svg viewBox="0 0 64 64" width="56" height="56" fill="none" stroke="none">
        <rect x="8"  y="40" width="48" height="10" rx="3" fill="var(--text-tertiary)" opacity="0.55"/>
        <rect x="8"  y="26" width="48" height="10" rx="3" fill="var(--text-secondary)" opacity="0.85"/>
        <rect x="8"  y="12" width="48" height="10" rx="3" fill="var(--accent-primary)"/>
      </svg>
    </div>
    <div class="word">
      <div class="lockup">
        <svg viewBox="0 0 64 64" fill="none">
          <rect x="8"  y="40" width="48" height="10" rx="3" fill="var(--text-tertiary)" opacity="0.55"/>
          <rect x="8"  y="26" width="48" height="10" rx="3" fill="var(--text-secondary)" opacity="0.85"/>
          <rect x="8"  y="12" width="48" height="10" rx="3" fill="var(--accent-primary)"/>
        </svg>
        <span class="name">Stratum<span class="dim">.</span></span>
      </div>
      <div class="tag">Dense productivity, layered. A design system for serious tools.</div>
    </div>
  </div>
</div>
</body></html>
