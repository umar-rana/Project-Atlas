<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: grid; grid-template-columns: 80px 60px 1fr; gap: 10px; align-items: center; padding: 3px 0; border-bottom: 1px dashed var(--border-subtle); }
  .row:last-child { border-bottom: none; }
  .name { font: 500 11px var(--font-mono); color: var(--text-secondary); }
  .px { font: 400 10px var(--font-mono); color: var(--text-tertiary); text-align: right; }
  .bar { height: 10px; background: var(--accent-primary); border-radius: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Spacing scale · 8pt grid + half-steps</div>
  <div class="row"><span class="name">space-px</span><span class="px">1px</span><span class="bar" style="width:1px"></span></div>
  <div class="row"><span class="name">space-0_5</span><span class="px">2</span><span class="bar" style="width:2px"></span></div>
  <div class="row"><span class="name">space-1</span><span class="px">4</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="name">space-1_5</span><span class="px">6</span><span class="bar" style="width:6px"></span></div>
  <div class="row"><span class="name">space-2</span><span class="px">8</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="name">space-2_5</span><span class="px">10</span><span class="bar" style="width:10px"></span></div>
  <div class="row"><span class="name">space-3</span><span class="px">12</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="name">space-4</span><span class="px">16</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="name">space-5</span><span class="px">20</span><span class="bar" style="width:20px"></span></div>
  <div class="row"><span class="name">space-6</span><span class="px">24</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="name">space-8</span><span class="px">32</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="name">space-10</span><span class="px">40</span><span class="bar" style="width:40px"></span></div>
  <div class="row"><span class="name">space-12</span><span class="px">48</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="name">space-16</span><span class="px">64</span><span class="bar" style="width:64px"></span></div>
  <div class="row"><span class="name">space-20</span><span class="px">80</span><span class="bar" style="width:80px"></span></div>
  <div class="row"><span class="name">space-24</span><span class="px">96</span><span class="bar" style="width:96px"></span></div>
</div>
</body></html>
