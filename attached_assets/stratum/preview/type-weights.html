<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8"><title>Weights</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row-w { display: grid; grid-template-columns: 100px 1fr 60px; gap: 16px; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--border-subtle); }
  .row-w:last-child { border-bottom: 0; }
  .row-w .name { font: 500 11px/1 var(--font-mono); color: var(--text-tertiary); letter-spacing: 0.04em; text-transform: uppercase; }
  .row-w .usage { font: 400 11px/1.4 var(--font-mono); color: var(--text-tertiary); text-align: right; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Weight system · Inter variable</div>
  <div class="row-w"><div class="name">400 Regular</div><div style="font:400 17px var(--font-ui); color:var(--text-primary);">The quick brown fox jumps</div><div class="usage">body</div></div>
  <div class="row-w"><div class="name">500 Medium</div><div style="font:500 17px var(--font-ui); color:var(--text-primary);">The quick brown fox jumps</div><div class="usage">UI emphasis</div></div>
  <div class="row-w"><div class="name">600 Semibold</div><div style="font:600 17px var(--font-ui); color:var(--text-primary);">The quick brown fox jumps</div><div class="usage">headings</div></div>
  <div class="row-w"><div class="name">700 Bold</div><div style="font:700 17px var(--font-ui); color:var(--text-primary);">The quick brown fox jumps</div><div class="usage">hero only</div></div>
  <div class="row-w"><div class="name">400 Italic</div><div style="font:400 italic 17px var(--font-ui); color:var(--text-secondary);">Reserved for quotes &amp; hints</div><div class="usage">prose</div></div>
</div>
</body></html>
