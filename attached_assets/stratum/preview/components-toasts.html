<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8"><title>Toast & banners</title>
<link rel="stylesheet" href="_card.css">
<style>
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .toast { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: var(--radius-lg); border: 1px solid var(--border-default); background: var(--surface-overlay); box-shadow: var(--shadow-5); font: 400 13px var(--font-ui); }
  .toast .ic { width: 16px; height: 16px; flex: 0 0 16px; }
  .toast .msg { flex: 1; color: var(--text-primary); }
  .toast .undo { font: 500 12px var(--font-ui); color: var(--accent-primary); cursor: pointer; }
  .t-success .ic { color: var(--accent-success); }
  .t-warning .ic { color: var(--accent-warning); }
  .t-danger  .ic { color: var(--accent-danger); }
  .t-info    .ic { color: var(--accent-info); }
  .banner { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-left: 3px solid; border-radius: var(--radius-md); font: 400 13px var(--font-ui); color: var(--text-primary); }
  .b-warning { background: var(--accent-warning-muted); border-color: var(--accent-warning); }
  .b-danger { background: var(--accent-danger-muted); border-color: var(--accent-danger); }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Toasts &amp; banners</div>
  <div class="stack">
    <div class="toast t-success">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>
      <span class="msg">Task moved to Today.</span><span class="undo">Undo</span>
    </div>
    <div class="toast t-danger">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v5M12 16h.01"/></svg>
      <span class="msg">Couldn't sync calendar — retrying in 30s.</span><span class="undo">Retry</span>
    </div>
    <div class="banner b-warning">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><path d="M12 9v4M12 17h.01"/></svg>
      You have <b style="font-weight:600;">3 overdue tasks</b> from last week.
    </div>
  </div>
</div>
</body></html>
