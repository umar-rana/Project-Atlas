<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .c { background: var(--surface-raised); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 12px 14px; box-shadow: var(--shadow-1); }
  .c .h { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
  .c h4 { margin: 0; font: 600 13px/1.3 var(--font-ui); color: var(--text-primary); letter-spacing: -0.01em; }
  .c .meta { font: 500 11px var(--font-mono); color: var(--text-tertiary); font-variant-numeric: tabular-nums; }
  .c p { margin: 0 0 8px; font: 400 12px/1.5 var(--font-ui); color: var(--text-secondary); }
  .c .progress { height: 4px; background: var(--surface-sunken); border-radius: var(--radius-full); overflow: hidden; }
  .c .progress > i { display:block; height: 100%; background: var(--accent-primary); }
  .c .row { display: flex; gap: 6px; align-items: center; margin-top: 8px; }
  .pill { font: 500 11px var(--font-ui); padding: 1px 7px; border-radius: var(--radius-xs); background: var(--accent-info-muted); color: var(--accent-info); }
  .stat { display: flex; align-items: baseline; gap: 6px; }
  .stat .v { font: 600 24px/1 var(--font-ui); color: var(--text-primary); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .stat .d { font: 500 12px var(--font-ui); color: var(--accent-success); }
  .spark { display: flex; align-items: flex-end; gap: 2px; height: 28px; margin-top: 8px; }
  .spark i { flex: 1; background: var(--accent-primary-muted); border-radius: 1px; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Cards · raised surface · e-1</div>
  <div class="grid">
    <div class="c">
      <div class="h"><h4>Q4 Launch</h4><span class="meta">12 / 18</span></div>
      <p>Marketing site refresh, pricing page, launch post.</p>
      <div class="progress"><i style="width: 67%"></i></div>
      <div class="row"><span class="pill">In progress</span><span class="meta">Due Oct 14</span></div>
    </div>
    <div class="c">
      <div class="h"><h4>Inbox</h4><span class="meta">3 new</span></div>
      <p>Triage and reply, then close.</p>
      <div class="stat"><span class="v">14</span><span class="d">↓ 23%</span></div>
      <div class="spark">
        <i style="height:30%"></i><i style="height:55%"></i><i style="height:42%"></i><i style="height:80%"></i><i style="height:60%"></i><i style="height:48%"></i><i style="height:30%"></i>
      </div>
    </div>
    <div class="c">
      <div class="h"><h4>Reading</h4><span class="meta">4 saved</span></div>
      <p>Articles &amp; notes for the week.</p>
      <div class="row" style="flex-wrap:wrap;">
        <span class="pill" style="background:var(--viz-5-light); color:var(--viz-5-strong);">essay</span>
        <span class="pill" style="background:var(--viz-3-light); color:var(--viz-3-strong);">paper</span>
        <span class="pill" style="background:var(--viz-2-light); color:var(--viz-2-strong);">notes</span>
      </div>
    </div>
  </div>
</div>
</body></html>
