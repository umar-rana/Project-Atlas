<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8"><title>Motion</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: grid; grid-template-columns: 130px 90px 1fr; gap: 10px; align-items: center; padding: 5px 0; border-bottom: 1px dashed var(--border-subtle); }
  .row:last-child { border: none; }
  .n { font: 500 11px var(--font-mono); color: var(--text-secondary); }
  .v { font: 400 11px var(--font-mono); color: var(--text-tertiary); text-align: right; }
  .track { height: 10px; background: var(--surface-sunken); border-radius: var(--radius-full); position: relative; overflow: hidden; }
  .dot { position: absolute; top: 0; height: 10px; width: 10px; background: var(--accent-primary); border-radius: 50%; animation: slide var(--d) infinite alternate var(--e); }
  @keyframes slide { from { left: 0; } to { left: calc(100% - 10px); } }
  .easings { display: flex; gap: 18px; margin-top: 12px; font: 500 10px var(--font-mono); color: var(--text-tertiary); }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Motion · durations &amp; easings</div>
  <div class="row"><span class="n">instant</span><span class="v">80ms</span><span class="track"><i class="dot" style="--d: 80ms; --e: var(--ease-standard);"></i></span></div>
  <div class="row"><span class="n">fast</span><span class="v">120ms</span><span class="track"><i class="dot" style="--d: 120ms; --e: var(--ease-standard);"></i></span></div>
  <div class="row"><span class="n">medium</span><span class="v">180ms</span><span class="track"><i class="dot" style="--d: 180ms; --e: var(--ease-standard);"></i></span></div>
  <div class="row"><span class="n">slow</span><span class="v">280ms</span><span class="track"><i class="dot" style="--d: 280ms; --e: var(--ease-standard);"></i></span></div>
  <div class="row"><span class="n">deliberate</span><span class="v">400ms</span><span class="track"><i class="dot" style="--d: 400ms; --e: var(--ease-spring);"></i></span></div>
  <div class="easings">
    <span>standard · (.16, 1, .3, 1)</span>
    <span>ease-out · entries</span>
    <span>ease-in · exits</span>
    <span>spring · sparingly</span>
  </div>
</div>
</body></html>
